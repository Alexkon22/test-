name: Проверка Markdown

on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Установить markdownlint
        run: npm install -g markdownlint-cli
      
      - name: Проверить все .md файлы
        run: markdownlint '**/*.md' --disable MD013 MD033
